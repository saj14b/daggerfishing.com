  <style>
    :root {
      --ocean: #0096C7;
      --deep:  #023E8A;
      --sand:  #E9C46A;
      --seafoam: #CAF0F8;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      min-height: 35rem;
    }

    body {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      position: relative;
      overflow-x: hidden;
      background-image: url('img/bg.webp');
      background-size: cover;
      background-position: center;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
    }

    /* ── Background video / image ── */
    .bg-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    .bg-img { display: none; }

    @media (max-width: 767px) {
      .bg-video { display: none; }
      .bg-img {
        display: block;
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -2;
      }
    }

    /* ── Sand overlay ── */
    .overlay {
      position: absolute;
      inset: 0;
      min-height: 35rem;
      background-color: var(--sand);
      opacity: 0.3;
      z-index: -1;
    }

    @media (min-width: 768px) {
      .overlay { min-height: 0; }
    }

    /* ── Masthead panel ── */
    .masthead {
      position: relative;
      overflow: hidden;
      padding-bottom: 3rem;
      min-height: 35rem;
      display: flex;
      align-items: center;
    }

    .masthead-bg {
      position: absolute;
      inset: 0;
      min-height: 35rem;
      background-color: rgba(2, 62, 138, 0.82);
      transform: skewY(4deg);
      transform-origin: bottom right;
    }

    .masthead-content {
      position: relative;
      color: #fff;
      padding: 3rem 2rem 2rem;
    }

    .masthead-content h1 {
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
      white-space: nowrap;
    }

    .masthead-content .services {
      font-size: 1.5rem;
      line-height: 1.8;
      margin-bottom: 1.5rem;
      font-weight: 300;
    }

    .masthead-content address {
      font-style: normal;
      margin-bottom: 1.5rem;
    }

    .masthead-content address p {
      font-size: 1.2rem;
      margin-bottom: 0.5rem;
    }

    .masthead-content address a {
      color: var(--seafoam);
      text-decoration: none;
    }

    .masthead-content address a:hover {
      text-decoration: underline;
    }

    .masthead-content h2 {
      font-size: 1.2rem;
      margin-bottom: 0.5rem;
    }

    /* ── Hours table ── */
    #hours {
      border-collapse: collapse;
      font-size: 1rem;
    }

    #hours th, #hours td {
      padding: 0.15rem 1rem 0.15rem 0;
      font-weight: 300;
      text-align: left;
    }

    #hours th {
      font-weight: 400;
      color: var(--seafoam);
      padding-right: 1.25rem;
    }

    /* ── Desktop masthead ── */
    @media (min-width: 768px) {
      .masthead {
        width: 40.5rem;
        height: 100vh;
        min-height: 0;
        padding-bottom: 0;
      }

      .masthead-bg {
        min-height: 0;
        transform: skewX(-8deg);
        transform-origin: top right;
      }

      .masthead-content {
        padding-left: 3rem;
        padding-right: 10rem;
      }

      .masthead-content h1 { font-size: 3.5rem; }
      .masthead-content .services { font-size: 1.5rem; }
      .masthead-content address p { font-size: 1.3rem; }
    }

    /* ── Social icons ── */
    .social-icons {
      position: absolute;
      bottom: 0;
      width: 100%;
      padding-bottom: 1.5rem;
    }

    .social-icons ul {
      list-style: none;
      display: flex;
      justify-content: center;
      gap: 1.25rem;
      margin-top: 1.5rem;
    }

    .social-icons ul li a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 4rem;
      height: 4rem;
      border-radius: 50%;
      background-color: rgba(0, 150, 199, 0.85);
      color: #fff;
      text-decoration: none;
      transition: background-color 0.2s ease-in-out;
    }

    .social-icons ul li a svg {
      width: 1.6rem;
      height: 1.6rem;
      fill: currentColor;
    }

    .social-icons ul li a:hover {
      background-color: var(--ocean);
    }

    .social-icons ul li a:focus-visible {
      outline: 3px solid var(--seafoam);
      outline-offset: 3px;
    }

    /* ── Reduced motion: swap video for static image ── */
    @media (prefers-reduced-motion: reduce) {
      .bg-video { display: none; }
      .bg-img {
        display: block;
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -2;
      }
    }

    @media (min-width: 768px) {
      .social-icons {
        width: auto;
        right: 2.5rem;
        bottom: 2rem;
        padding-bottom: 0;
      }

      .social-icons ul {
        flex-direction: column;
        gap: 1.5rem;
        margin-top: 0;
      }
    }
  </style>
